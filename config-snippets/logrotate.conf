# /etc/logrotate.d/wazuh-archives
# Rotate Wazuh manager archive logs daily, keep 30 days, compress, restart manager.

/var/ossec/logs/archives/archives.log /var/ossec/logs/archives/archives.json {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 wazuh wazuh
    postrotate
        /usr/bin/systemctl restart wazuh-manager
    endscript
}

# /etc/logrotate.d/wazuh-indexer
# Rotate indexer logs weekly, keep 3 weeks, compress.

/var/log/wazuh-indexer/*.log {
    weekly
    rotate 3
    compress
    missingok
    notifempty
    create 0640 wazuh-indexer wazuh-indexer
    postrotate
        systemctl try-restart wazuh-indexer
    endscript
}